name: Build and push Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── Main API image ───────────────────────────────────────────────────────────

      - name: Metadata — kaare
        id: meta-kaare
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dursnif/kaare
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push kaare
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-kaare.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=kaare
          cache-to: type=gha,mode=max,scope=kaare

      # ── Embedding image (BGE-M3, CPU-only torch) ─────────────────────────────────

      - name: Metadata — kaare-embedding
        id: meta-embedding
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dursnif/kaare-embedding
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push kaare-embedding
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.embedding
          push: true
          tags: ${{ steps.meta-embedding.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=kaare-embedding
          cache-to: type=gha,mode=max,scope=kaare-embedding

      # ── Voice image (faster-whisper, ffmpeg, Piper TTS) ──────────────────────────

      - name: Metadata — kaare-voice
        id: meta-voice
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dursnif/kaare-voice
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push kaare-voice
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.voice
          push: true
          tags: ${{ steps.meta-voice.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=kaare-voice
          cache-to: type=gha,mode=max,scope=kaare-voice

      # ── Frontend image (React/Vite → nginx) ──────────────────────────────────────

      - name: Metadata — kaare-frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dursnif/kaare-frontend
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push kaare-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=kaare-frontend
          cache-to: type=gha,mode=max,scope=kaare-frontend
