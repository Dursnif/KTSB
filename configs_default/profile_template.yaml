# profile_template.yaml
#
# User profile template — Kåre fills this progressively through conversation and observation.
# null  = not yet known (single value)
# []    = not yet known (list)
#
# PRIVACY MODEL:
#   - household_visible: ALWAYS accessible to Kåre (no PIN). Shared with the whole house.
#     Only these 6 hardcoded fields can ever be household-visible.
#   - Everything else: private. Encrypted with the user's PIN key (Fase 1).
#
# HOW IT WORKS:
#   - prompt_top is always loaded into the system prompt (keep it compact)
#   - Everything below prompt_top is searchable via RAG (loaded on demand)
#   - Kåre fills this in by inference from conversation — not by asking directly
#   - The reflection meeting and Jing/Jang also contribute over time
#

# _Dette er hva jeg vet om deg. Alt nytt jeg oppdager er verdifullt._

# ═══════════════════════════════════════════════════════════════════
# HOUSEHOLD VISIBLE — global, no PIN needed, visible to all users
# Use brukerprofil(action=oppdater_hus) to update these fields.
# ═══════════════════════════════════════════════════════════════════
household_visible:
  preferred_name: null    # what to call them in the household block
  role: null              # family | admin | guest
  age: null               # integer
  key_facts: []           # ["nøttallergi", "vegetarianer", "diabetiker"]
  current_context: null   # 1 sentence: what's going on in their life right now
  recent_updates: []      # ["Skiftet dekk 2026-05-17", "Farget håret rosa"]


# DO NOT store sensitive secrets here (passwords, tokens, etc.)

meta:
  user_id: null
  display_name: null
  role: null              # admin | family | guest
  created: null
  last_updated: null
  kare_summary: null      # 2-3 sentences Kåre writes to summarize this person

# ═══════════════════════════════════════════════════════════════════
# PROMPT TOP — always loaded into system prompt, keep compact
# ═══════════════════════════════════════════════════════════════════
prompt_top:
  preferred_name: null
  language: null
  personality_summary: null       # Kåre writes: who is this person in 2-3 sentences
  communication_style: null       # short/direct | elaborate | casual | formal
  response_length_preference: null  # short | medium | long
  formality_with_kare: null       # informal | neutral | formal
  proactivity_preference: null    # low | medium | high
  key_values: []                  # top 3-5 values this person holds
  topics_to_avoid: []
  topics_to_flag: []              # always mention / always check in on
  current_context: null           # 1-2 sentences: what is going on in their life right now
  curiosity: null                 # Kåre writes: what am I currently wondering about this person?

# ═══════════════════════════════════════════════════════════════════
# FULL PROFILE — searchable via RAG
