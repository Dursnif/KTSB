# KTSB – Node configuration
# Maps node names to Home Assistant media players and speakers.
# Edit this file through the admin GUI (Settings → Nodes) or directly here.
#
# Each node represents a physical device that can receive TTS announcements,
# play music, or display information. Supported types:
#   ha_media_player  — any media player entity in Home Assistant
#   chromecast       — Chromecast device (direct connection)
#   snapcast         — Snapcast client
# -------------------------------------------------------

nodes:
  living_room_speaker:
    description: Speaker in the living room
    type: ha_media_player
    entity_id: media_player.living_room_speaker
    room: living_room
    enabled: true
    mic_enabled: false
    default_user: ""

  kitchen_display:
    description: Smart display in the kitchen
    type: ha_media_player
    entity_id: media_player.kitchen_display
    room: kitchen
    enabled: true
    mic_enabled: true
    default_user: ""

  bedroom_speaker:
    description: Speaker in the bedroom
    type: ha_media_player
    entity_id: media_player.bedroom_speaker
    room: bedroom
    enabled: true
    mic_enabled: false
    default_user: ""
