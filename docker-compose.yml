name: kaare

volumes:
  ollama_models:
  bge_model:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes:
      - ./state/qdrant:/qdrant/storage

  # Built-in Ollama — optional (~10 GB image).
  # Enabled by default via COMPOSE_PROFILES=ollama in .env.
  # Remove "ollama" from COMPOSE_PROFILES if you have your own LLM server.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes:
      - ollama_models:/root/.ollama
    profiles: [ollama]

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      KAARE_DOMAIN: ${KAARE_DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./state/caddy_data:/data
      - ./state/caddy_config:/config

  # ── Main API image (all kaare-* services use the same image) ─────────────────

  kaare-api:
    image: ghcr.io/dursnif/kaare:latest
    restart: unless-stopped
    ports: ["8000:8000"]
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./data:/kaare/data
      - ./logs:/kaare/logs
    depends_on: [qdrant, ollama]

  kaare-ha-gateway:
    image: ghcr.io/dursnif/kaare:latest
    restart: unless-stopped
    ports: ["8002:8002"]
    command: uvicorn kaare_ha_gateway:app --host 0.0.0.0 --port 8002 --proxy-headers --forwarded-allow-ips=172.16.0.0/12
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./logs:/kaare/logs

  kaare-semantic-embed:
    image: ghcr.io/dursnif/kaare:latest
    restart: on-failure
    ports: ["11500:11500"]
    command: python server.py
    working_dir: /kaare/semantic_embed
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state

  kaare-argus:
    image: ghcr.io/dursnif/kaare:latest
    restart: unless-stopped
    command: python kaare_argus.py
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./logs:/kaare/logs
    depends_on: [qdrant]

  kaare-reflection:
    image: ghcr.io/dursnif/kaare:latest
    restart: on-failure
    command: python kaare_reflection_runner.py
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
    depends_on: [kaare-api]

  kaare-ha-log-bridge:
    image: ghcr.io/dursnif/kaare:latest
    restart: unless-stopped
    command: python services/ha_log_bridge/ha_log_bridge.py
    volumes:
      - ./configs:/kaare/configs
      - ./logs:/kaare/logs

  kaare-frontend:
    image: ghcr.io/dursnif/kaare-frontend:latest
    restart: unless-stopped
    ports: ["5173:80"]

  # ── VPN (optional — add "vpn" to COMPOSE_PROFILES to enable) ─────────────────
  # Requires: open UDP 51820 in your router, set WG_HOST and WG_PASSWORD_HASH in .env
  # Web UI for adding clients: http://your-ip:51821
  # WireGuard subnet must match vpn_subnet in configs/settings.yaml (default: 10.0.0.0/24)
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    restart: unless-stopped
    environment:
      WG_HOST: ${WG_HOST}
      PASSWORD_HASH: ${WG_PASSWORD_HASH}
      WG_DEFAULT_ADDRESS: "10.0.0.x"
      WG_DEFAULT_DNS: "1.1.1.1"
      WG_PORT: 51820
      PORT: 51821
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    volumes:
      - ./state/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    profiles: [vpn]

  # Night job — run manually: docker compose run --rm kaare-nightjob
  kaare-nightjob:
    image: ghcr.io/dursnif/kaare:latest
    restart: "no"
    command: python kaare_nightjob.py
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./data:/kaare/data
      - ./logs:/kaare/logs
    profiles: [manual]

  # ── Optional services (activate via COMPOSE_PROFILES in .env) ────────────────

  # profiles: [medium, full]
  kaare-embedding:
    image: ghcr.io/dursnif/kaare-embedding:latest
    restart: unless-stopped
    ports: ["11446:11446"]
    volumes:
      - ./configs:/kaare/configs
      - bge_model:/kaare/models/bge-m3
    profiles: [medium, full]

  # profiles: [full]
  kaare-voice:
    image: ghcr.io/dursnif/kaare-voice:latest
    restart: unless-stopped
    ports: ["8011:8011"]
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./models:/kaare/models
    profiles: [full]

  kaare-jing:
    build:
      context: .
      dockerfile: Dockerfile.inner_voices
      args:
        PROVIDER: openvino
    restart: unless-stopped
    command: ["python3", "jing_runner.py"]
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./services/inner_voices/models:/kaare/services/inner_voices/models
      - ./services/inner_voices/ov_cache:/kaare/services/inner_voices/ov_cache
    profiles: [inner_voices]

  kaare-jang:
    build:
      context: .
      dockerfile: Dockerfile.inner_voices
      args:
        PROVIDER: openvino
    restart: unless-stopped
    command: ["python3", "jang_runner.py"]
    volumes:
      - ./configs:/kaare/configs
      - ./state:/kaare/state
      - ./services/inner_voices/models:/kaare/services/inner_voices/models
      - ./services/inner_voices/ov_cache:/kaare/services/inner_voices/ov_cache
    profiles: [inner_voices]
